<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YuperMods</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0b1d3a;
    background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:16px 16px;
    color:white;
    font-family:'Press Start 2P', cursive;
}

header{
    text-align:center;
    padding:25px;
    background:#144ea8;
    border-bottom:6px solid #67b0ff;
    box-shadow:0 6px 0 #08306e;
}

.logo{
    font-size:28px;
    margin-bottom:10px;
    text-shadow:4px 4px 0 #08306e;
}

.subtitle{
    font-size:10px;
    opacity:0.9;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1b5fc9;
    border:4px solid #67b0ff;
    box-shadow:8px 8px 0 #08306e;
    padding:20px;
    margin-bottom:20px;
}

.card h2{
    font-size:14px;
    margin-top:0;
}

.button{
    display:inline-block;
    background:#4da6ff;
    color:white;
    text-decoration:none;
    padding:12px;
    margin:8px;
    border:3px solid #9fd2ff;
    box-shadow:4px 4px 0 #08306e;
    transition:0.1s;
    font-size:10px;
}

.button:hover{
    transform:translate(2px,2px);
    box-shadow:2px 2px 0 #08306e;
}

iframe{
    width:100%;
    height:800px;
    border:4px solid #67b0ff;
    background:white;
}

footer{
    text-align:center;
    padding:20px;
    font-size:10px;
    opacity:0.7;
}

.status{
    color:#cce8ff;
    font-size:10px;
    line-height:2;
}

@media (max-width:700px){

    .logo{
        font-size:18px;
    }

    .button{
        display:block;
        text-align:center;
        width:100%;
        margin:10px 0;
    }

    iframe{
        height:600px;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">YUPERMODS</div>
    <div class="subtitle">Pixel-Powered Melon Sandbox Mods</div>
</header>

<div class="container">

    <div class="card">
        <h2>WELCOME</h2>

        <div class="status">
            Download Melon Sandbox mods from the YuperMods collection.
        </div>

        <br>

        <a class="button"
           href="https://drive.google.com/drive/folders/1pLKEs8I3zcxFWAz1uVVrej1j6928N-71"
           target="_blank">
           OPEN DRIVE
        </a>
    </div>

    <div class="card">
        <h2>LINKS</h2>

        <a class="button"
           href="https://github.com/yehyaaljuboori1-ctrl"
           target="_blank">
           GITHUB PROFILE
        </a>

        <a class="button"
           href="https://www.youtube.com/@YehyaPlayz1628"
           target="_blank">
           YOUTUBE CHANNEL
        </a>

        <a class="button"
           href="https://drive.google.com/drive/folders/1pLKEs8I3zcxFWAz1uVVrej1j6928N-71"
           target="_blank">
           MOD STORAGE
        </a>
    </div>

    <div class="card">
        <h2>MOD LIBRARY</h2>

        <iframe
        src="https://drive.google.com/embeddedfolderview?id=1pLKEs8I3zcxFWAz1uVVrej1j6928N-71#grid">
        </iframe>
    </div>

</div>

<footer>
    © 2026 YuperMods | Created by Yuper
</footer>

</body>
</html>
